<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Helvetica Now Display";
}

html, body {
  height: 100%;
  width: 100%;
}

h1 {
  color: #555;
  font-size: 10rem;
  font-weight: 300;
  user-select: none;
}
#main {
  width: 100%;
  height: 100%;
  color: #222;
  padding: 30px;
}
input {
  display: block;
  background-color: #222;
  color: #fff;
}
#btn {
  padding: 12px 22px;
  background-color: rgba(45, 194, 202, 0.583);
  color: white;
  border-radius: 5px;
  transition: 0.3s ease-in-out;
}

#main #btn:hover {
  background-color: rgba(32, 116, 120, 0.583);
}

.card {
  border-radius: 10px;
  display: inline-block;
  padding: 20px;
  border: 1px solid #555;
  color: #fff;
  margin: 40px 10px 20px 0;
}
.card p {
  font-size: 0.8rem;
  margin-top: 20px;
  text-align: center;
}
.card h5 {
  margin-top: 3px;
}
.profile {
  width: 50px;
  height: 50px;
  background-color: red;
  border-radius: 50%;
  transition: 0.3s ease-in;
  box-shadow: 0px 0px 25px red;
  margin-bottom: 7px;
}
.profile img {
  height: 100%;
  width: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.card .profile:hover {
  transform: scale(0.9) translateY(-2px);
  box-shadow: 0px 0px 25px red,
              0px 0px 50px red,
              0px 0px 100px red;
}
  </style>
</head>
<body>
  <div id="main">
    <form action="#">
      <input type="text" placeholder="name">
      <input type="text" placeholder="pic">
      <input type="text" placeholder="occupation">
      <input type="text" placeholder="Describe">
      <input type="submit" value="submit">
    </form>
  </div>
  <script src="./form.js"></script>
</body>
</html>
