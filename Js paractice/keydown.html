<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyDown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html,
    body {
      height: 100%;
      width: 100%;
    }
    h1 {
      color: #555;
      font-size: 10rem;
      font-weight: 300;
      user-select: none;
    }
    #main {
      width: 100%;
      height: 100%;
      color: #222;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #btn {
      padding: 12px 22px;
      background-color: rgba(45, 194, 202, 0.583);
      color: white;
      border-radius: 5px;
      transition: 0.3s ease-in-out;
    }
    #main #btn:hover {
      background-color: rgba(32, 116, 120, 0.583);
    }
    input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="main">
    <h1></h1>
    <input id="fileinp" type="file">
    <div id="btn">Upload File</div>
  </div>

  <script src="./keydown.js"></script>
</body>
</html>
