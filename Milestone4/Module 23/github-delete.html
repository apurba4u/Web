<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Delete</title>
</head>
<body>
  <h1>My secret info</h1>
  <input type="text" id="inp-dlt" placeholder="write delete">
  <button id="btn-dlt" disabled>Delete</button>

  <script>
    const input = document.querySelector("#inp-dlt")
    input.addEventListener('keyup', (elem) => {
      const dltBtn = document.querySelector("#btn-dlt")
      const text = elem.target.value
      // console.log('User is typing ', text);
      if (text === 'delete') {
      console.log('Delete Typed');
      dltBtn.removeAttribute('disabled')
      // dltBtn.setAttribute('disabled', false)
      } else {
        console.log('Something else');
        dltBtn.setAttribute('disabled', true)
      }
      dltBtn.addEventListener('click', () => {
        elem.target.value = ''
        dltBtn.setAttribute('disabled', true)
      })
    })
  </script>
</body>
</html>
