<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tea House Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="manrope">
    <!-- Banner Section -->
    <section class="grid grid-cols-1 md:grid-cols-2 container mx-auto">
      <div class="banner-left space-y-8">
        <h2 class="text-[80px] font-bold text-[#1c1c1c]">It's good <br> tea time at The <br> Tea House</h2>
        <p class="text-[#777]">Tea and Botanical Solutions Supplier Give Optimum <br> Satisfaction To Your Taste Buds.</p>
        <button class="p-4 rounded-md text-white font-semibold bg-linear-to-r from-[#ff8938] to-[#ff0000]">Explore More
          <span class="-rotate-45 inline-block">
            <i class="fa-solid fa-arrow-right"></i>
          </span>
        </button>
      </div>
      <div class="banner-right flex justify-end items-end relative">
        <img src="./images/banner.png" alt="">
        <div class="bg-white rounded-xl shadow-2xl flex justify-center items-center absolute bottom-4 left-50 gap-2 py-5 px-7">
          <img src="./images/ratings.png" alt="">
          <div class="flex flex-col gap">
            <h2 class="font-semibold text-[#1c1c1c] text-2xl">5.00</h2>
            <p class="text-[#777]">Trust Rating</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
